# Sara & Eva — Location Catalog
#
# Persistent library of every canonical scene/location for the show.
# The storyboard generator reads from this catalog when deciding which
# scene to bind for each Kling multi-shot clip. Every entry locks:
#
#   id                  — stable scene ID (matches SCENES dict in generateScenes.py)
#   label               — human-readable name (for story writer)
#   description         — 1–2 sentence summary (what this location is for)
#   rendered_png        — the Pixar-style locked scene PNG (Kling scene-ref)
#   real_photo_refs     — source photos used to generate it (layout anchor)
#   tags                — story-relevance tags (helps episode prompts pick locations)
#   time_of_day         — implicit time-of-day; use a different scene if you need another
#
# To add a new location:
#   1. Add an entry to SCENES in generateScenes.py
#   2. Generate it via `python3 generateScenes.py --scene <id>`
#   3. Add a block here
#   4. Commit both files together

